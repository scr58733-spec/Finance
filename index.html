<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="收支記錄">
<meta name="theme-color" content="#0a0f1c">
<title>收支記錄</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f1c;--surface:#111827;--card:#161f2e;--card2:#1a2537;--border:#1e2d42;
  --accent:#e8c87a;--accent2:#b8985a;--green:#52c99a;--red:#f06b7a;--blue:#6aadff;
  --text:#e8edf5;--sub:#8a9ab5;
}
html,body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100%;overflow-x:hidden}
.nav{position:sticky;top:0;z-index:90;background:rgba(10,15,28,.95);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.nav-title{font-size:1.2rem;color:var(--accent);font-weight:600}
.nav-sub{font-size:.6rem;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.nav-btns{display:flex;gap:8px}
.btn{border:none;cursor:pointer;border-radius:10px;font-family:-apple-system,sans-serif;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-size:.85rem;padding:9px 16px}
.btn-add{background:var(--accent);color:#0a0f1c}
.btn-export{background:var(--card2);color:var(--sub);border:1px solid var(--border)}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.c1::before{background:linear-gradient(90deg,var(--accent),transparent)}
.c2::before{background:linear-gradient(90deg,var(--green),transparent)}
.c3::before{background:linear-gradient(90deg,var(--red),transparent)}
.c4::before{background:linear-gradient(90deg,var(--blue),transparent)}
.card-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);font-family:'Menlo',monospace;margin-bottom:8px}
.card-value{font-family:'Menlo','Courier New',monospace;font-size:1.05rem;font-weight:500}
.c1 .card-value{color:var(--accent)}.c2 .card-value{color:var(--green)}.c3 .card-value{color:var(--red)}.c4 .card-value{color:var(--blue)}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 18px;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);font-family:'Menlo',monospace}
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--border);background:var(--card);color:var(--sub);padding:5px 13px;border-radius:20px;font-size:.72rem;cursor:pointer;white-space:nowrap;font-family:'Menlo',monospace}
.chip.on{background:var(--accent);color:#0a0f1c;border-color:var(--accent);font-weight:700}
.list{padding:0 16px 80px;display:flex;flex-direction:column;gap:10px}
.row{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.row-main{padding:14px 16px;cursor:pointer}
.row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.row-date{font-family:'Menlo',monospace;font-size:.85rem;color:var(--accent);font-weight:500}
.row-bal{font-family:'Menlo',monospace;font-size:.95rem;font-weight:600}
.pos{color:var(--blue)}.neg{color:var(--red)}
.row-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.fl{font-size:.56rem;text-transform:uppercase;color:var(--sub);font-family:'Menlo',monospace}
.fv{font-family:'Menlo',monospace;font-size:.8rem;margin-top:2px}
.row-acts{display:flex;border-top:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .2s}
.row-acts.open{max-height:60px}
.act-btn{flex:1;padding:12px;border:none;background:transparent;cursor:pointer;font-size:.8rem;font-family:-apple-system,sans-serif;font-weight:500;display:flex;align-items:center;justify-content:center;gap:4px}
.act-btn.e{color:var(--blue)}.act-btn.d{color:var(--red)}
.act-btn+.act-btn{border-left:1px solid var(--border)}
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-i{font-size:2.5rem;margin-bottom:12px;opacity:.3}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:32px;transform:translateY(100%);transition:transform .28s cubic-bezier(.22,.9,.3,1);position:relative}
.ov.open .sheet{transform:none}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.stitle{font-size:1.2rem;color:var(--accent);padding:16px 20px;font-weight:600}
.xbtn{position:absolute;top:14px;right:16px;background:var(--card2);border:1px solid var(--border);color:var(--sub);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.fbody{padding:0 18px;display:flex;flex-direction:column;gap:14px}
.fg label{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);font-family:'Menlo',monospace;margin-bottom:6px}
.fi{background:var(--card);border:1.5px solid var(--border);border-radius:11px;color:var(--text);padding:13px 15px;font-size:1rem;font-family:'Menlo',monospace;outline:none;width:100%;-webkit-appearance:none}
.fi:focus{border-color:var(--accent2)}
input[type=date].fi{color-scheme:dark}
.fi.err{border-color:var(--red)}
.ferr{font-size:.68rem;color:var(--red);font-family:'Menlo',monospace;margin-top:3px;display:block}
.computed{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center}
.cl{font-size:.72rem;color:var(--sub);font-family:'Menlo',monospace}
.cv{font-family:'Menlo',monospace;font-size:1.05rem;font-weight:600;color:var(--blue)}
.cv.neg{color:var(--red)}
.save-btn{background:var(--accent);color:#0a0f1c;border:none;width:100%;padding:14px;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif}
.divider{height:1px;background:var(--border)}
.eopt{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;border-bottom:1px solid var(--border)}
.eopt:last-child{border-bottom:none}
.eico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.eico.csv{background:rgba(82,201,154,.12)}.eico.pdf{background:rgba(240,107,122,.12)}
.et{font-size:.9rem;font-weight:600}.es{font-size:.72rem;color:var(--sub);margin-top:2px}
.cov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .15s}
.cov.open{opacity:1;pointer-events:all}
.cbox{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:300px;overflow:hidden}
.chdr{padding:22px 20px 14px;text-align:center}
.ctitle{font-size:1rem;font-weight:600;margin-bottom:6px}
.cmsg{font-size:.82rem;color:var(--sub);line-height:1.5}
.cbtns{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.cbtn{padding:14px;border:none;background:transparent;cursor:pointer;font-size:.88rem;font-family:-apple-system,sans-serif;font-weight:500}
.cbtn.no{color:var(--sub)}.cbtn.yes{color:var(--red);border-left:1px solid var(--border)}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:.82rem;opacity:0;transition:.2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%)}
</style>
</head>
<body>

<nav class="nav">
  <div>
    <div class="nav-title">收支記錄</div>
    <div class="nav-sub">Finance Tracker</div>
  </div>
  <div class="nav-btns">
    <button class="btn btn-export" id="btn-export">⬆ 匯出</button>
    <button class="btn btn-add" id="btn-add">＋ 新增</button>
  </div>
</nav>

<div class="summary">
  <div class="card c1"><div class="card-label">結餘合計</div><div class="card-value" id="s1">0.00</div></div>
  <div class="card c2"><div class="card-label">本期收入合計</div><div class="card-value" id="s2">0.00</div></div>
  <div class="card c3"><div class="card-label">支出合計</div><div class="card-value" id="s3">0.00</div></div>
  <div class="card c4"><div class="card-label">收入餘額合計</div><div class="card-value" id="s4">0.00</div></div>
</div>

<div class="filter-bar" id="filter-bar"></div>
<div class="sec-hdr"><span>歷史資料</span><span id="count">0 筆</span></div>
<div class="list" id="list"></div>

<div class="ov" id="form-ov">
  <div class="sheet">
    <div class="handle"></div>
    <div class="stitle" id="form-title">新增紀錄</div>
    <button class="xbtn" id="form-close">✕</button>
    <div class="fbody">
      <div class="fg"><label>日期</label><input class="fi" type="date" id="f-date"></div>
      <div class="divider"></div>
      <div class="fg"><label>結餘</label><input class="fi" type="number" inputmode="decimal" placeholder="0.00" id="f-op"><span class="ferr" id="e-op"></span></div>
      <div class="fg"><label>本期收入</label><input class="fi" type="number" inputmode="decimal" placeholder="0.00" id="f-in"><span class="ferr" id="e-in"></span></div>
      <div class="fg"><label>支出</label><input class="fi" type="number" inputmode="decimal" placeholder="0.00" id="f-ex"><span class="ferr" id="e-ex"></span></div>
      <div class="computed"><span class="cl">本期收入餘額（自動計算）</span><span class="cv" id="f-bal">0.00</span></div>
      <button class="save-btn" id="save-btn">💾 儲存</button>
    </div>
  </div>
</div>

<div class="ov" id="exp-ov">
  <div class="sheet" style="padding-bottom:16px">
    <div class="handle"></div>
    <div class="stitle">匯出資料</div>
    <button class="xbtn" id="exp-close">✕</button>
    <div id="exp-csv" class="eopt"><div class="eico csv">📊</div><div><div class="et">匯出 CSV（Excel 格式）</div><div class="es">可用 Excel、Numbers 開啟</div></div></div>
    <div id="exp-pdf" class="eopt"><div class="eico pdf">📄</div><div><div class="et">匯出 PDF 報表</div><div class="es">開啟列印視窗存成 PDF</div></div></div>
  </div>
</div>

<div class="cov" id="conf-ov">
  <div class="cbox">
    <div class="chdr"><div class="ctitle">刪除紀錄</div><div class="cmsg" id="conf-msg"></div></div>
    <div class="cbtns">
      <button class="cbtn no" id="conf-no">取消</button>
      <button class="cbtn yes" id="conf-yes">刪除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var records=[], editId=null, openRow=null, filterMonth='all', delId=null;
  var KEY='ftv3';
  function save(){try{localStorage.setItem(KEY,JSON.stringify(records));}catch(e){}}
  function load(){try{var d=localStorage.getItem(KEY);if(d)records=JSON.parse(d);}catch(e){records=[];}}
  function fmt(v){return Number(v).toLocaleString('zh-TW',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function fmtR(v){return Number(v).toFixed(2);}
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
  function today(){return new Date().toISOString().slice(0,10);}
  function sortR(){records.sort(function(a,b){return b.date>a.date?1:b.date<a.date?-1:0;});}
  function filtered(){if(filterMonth==='all')return records;return records.filter(function(r){return r.date.slice(0,7)===filterMonth;});}
  function months(){var s={};records.forEach(function(r){s[r.date.slice(0,7)]=1;});return['all'].concat(Object.keys(s).sort().reverse());}
  var tTimer;
  function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(function(){el.classList.remove('show');},2200);}
  function render(){sortR();renderSummary();renderFilters();renderList();}
  function renderSummary(){
    var recs=filtered(),op=0,inc=0,ex=0,bal=0;
    recs.forEach(function(r){op+=r.op;inc+=r.inc;ex+=r.ex;bal+=(r.op+r.inc-r.ex);});
    document.getElementById('s1').textContent=fmt(op);
    document.getElementById('s2').textContent=fmt(inc);
    document.getElementById('s3').textContent=fmt(ex);
    document.getElementById('s4').textContent=fmt(bal);
  }
  function renderFilters(){
    var bar=document.getElementById('filter-bar'),ms=months();
    if(ms.length<=2){bar.innerHTML='';return;}
    bar.innerHTML=ms.map(function(m){return'<span class="chip'+(m===filterMonth?' on':'')+'" data-m="'+m+'">'+(m==='all'?'全部':m)+'</span>';}).join('');
    bar.querySelectorAll('.chip').forEach(function(el){el.addEventListener('click',function(){filterMonth=this.dataset.m;render();});});
  }
  function renderList(){
    var recs=filtered(),list=document.getElementById('list');
    document.getElementById('count').textContent=recs.length+' 筆';
    if(!recs.length){list.innerHTML='<div class="empty"><div class="empty-i">📋</div><div>目前沒有紀錄<br>點右上角「＋ 新增」開始記帳</div></div>';return;}
    list.innerHTML=recs.map(function(r){
      var bal=r.op+r.inc-r.ex;
      return'<div class="row"><div class="row-main" data-id="'+r.id+'"><div class="row-top"><span class="row-date">'+r.date+'</span><span class="row-bal '+(bal>=0?'pos':'neg')+'">'+fmt(bal)+'</span></div><div class="row-grid"><div><div class="fl">結餘</div><div class="fv">'+fmt(r.op)+'</div></div><div><div class="fl">本期收入</div><div class="fv" style="color:var(--green)">'+fmt(r.inc)+'</div></div><div><div class="fl">支出</div><div class="fv" style="color:var(--red)">'+fmt(r.ex)+'</div></div></div></div><div class="row-acts" id="act-'+r.id+'"><button class="act-btn e" data-id="'+r.id+'">✏️ 修改</button><button class="act-btn d" data-id="'+r.id+'" data-date="'+r.date+'">🗑 刪除</button></div></div>';
    }).join('');
    list.querySelectorAll('.row-main').forEach(function(el){el.addEventListener('click',function(){toggleRow(this.dataset.id);});});
    list.querySelectorAll('.act-btn.e').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();openEdit(this.dataset.id);});});
    list.querySelectorAll('.act-btn.d').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();askDel(this.dataset.id,this.dataset.date);});});
  }
  function toggleRow(id){
    if(openRow&&openRow!==id){var p=document.getElementById('act-'+openRow);if(p)p.classList.remove('open');}
    var el=document.getElementById('act-'+id);if(!el)return;
    openRow=el.classList.toggle('open')?id:null;
  }
  function calcBal(){
    var o=parseFloat(document.getElementById('f-op').value)||0;
    var i=parseFloat(document.getElementById('f-in').value)||0;
    var e=parseFloat(document.getElementById('f-ex').value)||0;
    var b=o+i-e,el=document.getElementById('f-bal');
    el.textContent=fmt(b);el.className='cv'+(b<0?' neg':'');
  }
  function clearForm(){
    ['op','in','ex'].forEach(function(k){document.getElementById('f-'+k).value='';document.getElementById('e-'+k).textContent='';document.getElementById('f-'+k).classList.remove('err');});
    calcBal();
  }
  function openAdd(){editId=null;document.getElementById('form-title').textContent='新增紀錄';document.getElementById('f-date').value=today();clearForm();document.getElementById('form-ov').classList.add('open');}
  function openEdit(id){
    if(openRow){var el=document.getElementById('act-'+openRow);if(el)el.classList.remove('open');openRow=null;}
    var r=records.find(function(x){return x.id===id;});if(!r)return;
    editId=id;document.getElementById('form-title').textContent='修改紀錄';
    document.getElementById('f-date').value=r.date;document.getElementById('f-op').value=fmtR(r.op);document.getElementById('f-in').value=fmtR(r.inc);document.getElementById('f-ex').value=fmtR(r.ex);
    ['op','in','ex'].forEach(function(k){document.getElementById('e-'+k).textContent='';document.getElementById('f-'+k).classList.remove('err');});
    calcBal();document.getElementById('form-ov').classList.add('open');
  }
  function closeForm(){document.getElementById('form-ov').classList.remove('open');editId=null;}
  function saveRecord(){
    var date=document.getElementById('f-date').value,op=document.getElementById('f-op').value,inc=document.getElementById('f-in').value,ex=document.getElementById('f-ex').value,ok=true;
    function chk(f,v,l){if(v===''||isNaN(parseFloat(v))){document.getElementById('e-'+f).textContent='請輸入'+l;document.getElementById('f-'+f).classList.add('err');ok=false;}}
    chk('op',op,'結餘');chk('in',inc,'收入');chk('ex',ex,'支出');
    if(!ok)return;
    var rec={id:editId||uid(),date:date,op:parseFloat(op),inc:parseFloat(inc),ex:parseFloat(ex)};
    if(editId){var idx=records.findIndex(function(r){return r.id===editId;});if(idx>-1)records[idx]=rec;toast('✅ 已更新');}
    else{records.push(rec);toast('✅ 已新增');}
    save();closeForm();render();
  }
  function askDel(id,date){delId=id;document.getElementById('conf-msg').textContent='確定要刪除 '+date+' 的紀錄嗎？';document.getElementById('conf-ov').classList.add('open');}
  function doCSV(){
    var recs=filtered(),rows=['日期,結餘,本期收入,支出,本期收入餘額'];
    recs.forEach(function(r){rows.push(r.date+','+fmtR(r.op)+','+fmtR(r.inc)+','+fmtR(r.ex)+','+fmtR(r.op+r.inc-r.ex));});
    var blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download='收支記錄.csv';a.click();toast('📊 CSV 匯出完成');
  }
  function doPDF(){
    var recs=filtered(),tot={op:0,inc:0,ex:0,bal:0};
    recs.forEach(function(r){tot.op+=r.op;tot.inc+=r.inc;tot.ex+=r.ex;tot.bal+=(r.op+r.inc-r.ex);});
    var rows=recs.map(function(r,i){var b=r.op+r.inc-r.ex;return'<tr style="background:'+(i%2===0?'#f5f7fa':'#fff')+'"><td>'+r.date+'</td><td>'+fmtR(r.op)+'</td><td>'+fmtR(r.inc)+'</td><td>'+fmtR(r.ex)+'</td><td style="color:'+(b>=0?'#1a5fd4':'#c0392b')+';font-weight:600">'+fmtR(b)+'</td></tr>';}).join('');
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>收支記錄</title><style>body{font-family:-apple-system,sans-serif;padding:32px;color:#111}h1{font-size:20px;margin-bottom:4px}.m{font-size:12px;color:#666;margin-bottom:20px}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#1a1a2e;color:#fff;padding:10px 12px;text-align:right}th:first-child{text-align:left}td{padding:9px 12px;text-align:right;font-family:monospace;font-size:12px}td:first-child{text-align:left;font-family:sans-serif}.tot td{border-top:2px solid #1a1a2e;font-weight:700;background:#eef2ff}@media print{body{margin:0}}</style></head><body><h1>收支記錄報表</h1><div class="m">列印日期：'+new Date().toLocaleDateString('zh-TW')+' | '+recs.length+' 筆</div><table><thead><tr><th>日期</th><th>結餘</th><th>本期收入</th><th>支出</th><th>本期收入餘額</th></tr></thead><tbody>'+rows+'<tr class="tot"><td>合計</td><td>'+fmtR(tot.op)+'</td><td>'+fmtR(tot.inc)+'</td><td>'+fmtR(tot.ex)+'</td><td>'+fmtR(tot.bal)+'</td></tr></tbody></table><script>window.onload=function(){window.print();}<\/script></body></html>';

```
var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}toast('📄 PDF 視窗已開啟');
```

}
document.addEventListener(‘DOMContentLoaded’,function(){
load();render();
document.getElementById(‘btn-add’).addEventListener(‘click’,openAdd);
document.getElementById(‘btn-export’).addEventListener(‘click’,function(){document.getElementById(‘exp-ov’).classList.add(‘open’);});
document.getElementById(‘form-close’).addEventListener(‘click’,closeForm);
document.getElementById(‘exp-close’).addEventListener(‘click’,function(){document.getElementById(‘exp-ov’).classList.remove(‘open’);});
document.getElementById(‘save-btn’).addEventListener(‘click’,saveRecord);
document.getElementById(‘f-op’).addEventListener(‘input’,calcBal);
document.getElementById(‘f-in’).addEventListener(‘input’,calcBal);
document.getElementById(‘f-ex’).addEventListener(‘input’,calcBal);
document.getElementById(‘exp-csv’).addEventListener(‘click’,function(){document.getElementById(‘exp-ov’).classList.remove(‘open’);doCSV();});
