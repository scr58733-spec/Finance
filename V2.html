<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="收支記錄">
<title>收支記錄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0f1c;color:#e8edf5;min-height:100vh}
nav{background:#0d1424;border-bottom:1px solid #1e2d42;padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.ntitle{font-size:1.15rem;font-weight:700;color:#e8c87a}
.nsub{font-size:.6rem;color:#8a9ab5;text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.nbtns{display:flex;gap:8px}
.badd{background:#e8c87a;color:#0a0f1c;border:none;padding:10px 18px;border-radius:10px;font-weight:700;font-size:.85rem;cursor:pointer}
.bexp{background:#1a2537;color:#8a9ab5;border:1px solid #1e2d42;padding:10px 14px;border-radius:10px;font-size:.85rem;cursor:pointer}

/* Warning Banner */
.warn-banner{display:none;margin:12px 14px 0;background:rgba(240,107,122,.12);border:1px solid rgba(240,107,122,.35);border-radius:12px;padding:12px 14px;align-items:center;gap:10px}
.warn-banner.show{display:flex}
.warn-icon{font-size:1.4rem;flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.warn-text{font-size:.82rem;line-height:1.4}
.warn-title{font-weight:700;color:#f06b7a;font-size:.88rem}
.warn-sub{color:#c0707a;font-size:.75rem;margin-top:2px}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.card{background:#161f2e;border:1px solid #1e2d42;border-radius:12px;padding:14px;position:relative;overflow:hidden;transition:.2s}
.card::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px}
.ca::before{background:linear-gradient(90deg,#e8c87a,transparent)}
.cg::before{background:linear-gradient(90deg,#52c99a,transparent)}
.cr::before{background:linear-gradient(90deg,#f06b7a,transparent)}
.cb::before{background:linear-gradient(90deg,#6aadff,transparent)}
.cb.danger{border-color:rgba(240,107,122,.5);background:rgba(240,107,122,.06)}
.cb.danger::before{background:linear-gradient(90deg,#f06b7a,transparent)}
.clb{font-size:.58rem;text-transform:uppercase;color:#8a9ab5;letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.clv{font-family:‘Menlo’,‘Courier New’,monospace;font-size:1rem;font-weight:600}
.ca .clv{color:#e8c87a}.cg .clv{color:#52c99a}.cr .clv{color:#f06b7a}.cb .clv{color:#6aadff}
.cb.danger .clv{color:#f06b7a}

.fbar{display:flex;gap:8px;padding:0 14px 8px;overflow-x:auto}
.fbar::-webkit-scrollbar{display:none}
.chip{background:#161f2e;border:1px solid #1e2d42;color:#8a9ab5;padding:5px 12px;border-radius:20px;font-size:.72rem;cursor:pointer;white-space:nowrap}
.chip.on{background:#e8c87a;color:#0a0f1c;border-color:#e8c87a;font-weight:700}
.shdr{display:flex;justify-content:space-between;padding:6px 16px;font-size:.62rem;text-transform:uppercase;color:#8a9ab5;letter-spacing:.1em}
.rlist{padding:0 14px 80px;display:flex;flex-direction:column;gap:10px}
.ritem{background:#161f2e;border:1px solid #1e2d42;border-radius:12px;overflow:hidden}
.rmain{padding:13px 14px;cursor:pointer}
.rtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rdate{font-family:‘Menlo’,monospace;font-size:.82rem;color:#e8c87a;font-weight:600}
.rbadge{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em}
.badge-ex{background:rgba(240,107,122,.15);color:#f06b7a}
.badge-in{background:rgba(82,201,154,.15);color:#52c99a}
.badge-op{background:rgba(232,200,122,.15);color:#e8c87a}
.badge-full{background:rgba(106,173,255,.15);color:#6aadff}
.ramt{font-family:‘Menlo’,monospace;font-size:1.05rem;font-weight:700}
.ramt.ex{color:#f06b7a}.ramt.in{color:#52c99a}.ramt.op{color:#e8c87a}.ramt.bl{color:#6aadff}
.ramt.neg{color:#f06b7a}
.rnote{font-size:.75rem;color:#8a9ab5;margin-top:6px;line-height:1.4}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:4px}
.rfl{font-size:.55rem;text-transform:uppercase;color:#8a9ab5}
.rfv{font-family:‘Menlo’,monospace;font-size:.78rem;margin-top:2px}
.racts{display:flex;border-top:1px solid #1e2d42;max-height:0;overflow:hidden;transition:max-height .2s}
.racts.open{max-height:56px}
.ract{flex:1;padding:12px;border:none;background:transparent;cursor:pointer;font-size:.78rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px}
.ract.e{color:#6aadff}.ract.d{color:#f06b7a;border-left:1px solid #1e2d42}
.empty{text-align:center;padding:56px 20px;color:#8a9ab5}
.ei{font-size:2.5rem;margin-bottom:12px;opacity:.3}

/* Overlays */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:flex-end;visibility:hidden;opacity:0;transition:opacity .2s,visibility .2s}
.ov.open{visibility:visible;opacity:1}
.sheet{background:#111827;border-radius:20px 20px 0 0;border-top:1px solid #1e2d42;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:32px;transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.3,1);position:relative}
.ov.open .sheet{transform:none}
.hdl{width:34px;height:4px;background:#1e2d42;border-radius:2px;margin:12px auto 0}
.stit{font-size:1.15rem;font-weight:700;padding:14px 18px 16px}
.stit.ex{color:#f06b7a}.stit.in{color:#52c99a}.stit.op{color:#e8c87a}.stit.full{color:#6aadff}
.xcl{position:absolute;top:12px;right:14px;background:#1a2537;border:1px solid #1e2d42;color:#8a9ab5;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.fbody{padding:0 16px;display:flex;flex-direction:column;gap:12px}
.fg label{display:block;font-size:.6rem;text-transform:uppercase;color:#8a9ab5;letter-spacing:.1em;margin-bottom:5px}
.fi{background:#161f2e;border:1.5px solid #1e2d42;border-radius:10px;color:#e8edf5;padding:12px 14px;font-size:1rem;font-family:‘Menlo’,monospace;width:100%;outline:none;-webkit-appearance:none}
.fi:focus{border-color:#b8985a}
.fi.err{border-color:#f06b7a}
input[type=date].fi{color-scheme:dark}
textarea.fi{resize:none;font-family:-apple-system,sans-serif;font-size:.9rem;line-height:1.5;min-height:72px}
.fe{font-size:.66rem;color:#f06b7a;margin-top:3px;display:block}
.divr{height:1px;background:#1e2d42}
.comp{background:#080c14;border:1px solid #1e2d42;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.compl{font-size:.7rem;color:#8a9ab5}
.compv{font-family:‘Menlo’,monospace;font-size:1rem;font-weight:700;color:#6aadff}
.compv.neg{color:#f06b7a}
.sbtn{border:none;width:100%;padding:14px;border-radius:11px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:4px;color:#0a0f1c}
.sbtn.ex{background:#f06b7a}.sbtn.in{background:#52c99a}.sbtn.op{background:#e8c87a}.sbtn.full{background:#6aadff}

/* Type grid */
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 4px}
.type-btn{border:1.5px solid #1e2d42;background:#161f2e;border-radius:14px;padding:16px 12px;cursor:pointer;text-align:center;transition:.15s all}
.type-btn:active{transform:scale(.97)}
.type-btn .tbi{font-size:1.8rem;margin-bottom:6px}
.type-btn .tbl{font-size:.85rem;font-weight:700}
.type-btn .tbs{font-size:.68rem;color:#8a9ab5;margin-top:3px}
.type-btn.t-ex{border-color:rgba(240,107,122,.4)}.type-btn.t-ex .tbl{color:#f06b7a}
.type-btn.t-in{border-color:rgba(82,201,154,.4)}.type-btn.t-in .tbl{color:#52c99a}
.type-btn.t-op{border-color:rgba(232,200,122,.4)}.type-btn.t-op .tbl{color:#e8c87a}
.type-btn.t-full{border-color:rgba(106,173,255,.4)}.type-btn.t-full .tbl{color:#6aadff}

/* Export */
.eopt{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;border-bottom:1px solid #1e2d42}
.eopt:last-child{border-bottom:none}
.eico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.ecsv{background:rgba(82,201,154,.12)}.epdf{background:rgba(240,107,122,.12)}
.et{font-size:.88rem;font-weight:600}.es{font-size:.7rem;color:#8a9ab5;margin-top:2px}

/* Confirm */
.cov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;visibility:hidden;opacity:0;transition:opacity .15s,visibility .15s}
.cov.open{visibility:visible;opacity:1}
.cbox{background:#111827;border:1px solid #1e2d42;border-radius:16px;width:100%;max-width:290px;overflow:hidden}
.chdr{padding:20px 18px 12px;text-align:center}
.ctit{font-size:.95rem;font-weight:700;margin-bottom:6px}
.cmsg{font-size:.8rem;color:#8a9ab5;line-height:1.5}
.cbtns{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #1e2d42}
.cbtn{padding:13px;border:none;background:transparent;cursor:pointer;font-size:.85rem;font-weight:600}
.cno{color:#8a9ab5}.cyes{color:#f06b7a;border-left:1px solid #1e2d42}

/* Toast */
.tst{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a2537;border:1px solid #1e2d42;border-radius:20px;padding:9px 18px;font-size:.8rem;opacity:0;transition:.2s;pointer-events:none;z-index:999;white-space:nowrap}
.tst.show{opacity:1;transform:translateX(-50%)}
</style>

</head>
<body>

<nav>
  <div><div class="ntitle">收支記錄</div><div class="nsub">Finance Tracker v4</div></div>
  <div class="nbtns">
    <button class="bexp" id="btnExp">⬆ 匯出</button>
    <button class="badd" id="btnAdd">＋ 新增</button>
  </div>
</nav>

<!-- 警示橫幅 -->

<div class="warn-banner" id="warnBanner">
  <div class="warn-icon">⚠️</div>
  <div class="warn-text">
    <div class="warn-title">餘額警示</div>
    <div class="warn-sub" id="warnMsg">收入餘額偏低，請注意支出！</div>
  </div>
</div>

<div class="cards">
  <div class="card ca"><div class="clb">結餘合計</div><div class="clv" id="s1">0.00</div></div>
  <div class="card cg"><div class="clb">本期收入合計</div><div class="clv" id="s2">0.00</div></div>
  <div class="card cr"><div class="clb">支出合計</div><div class="clv" id="s3">0.00</div></div>
  <div class="card cb" id="balCard"><div class="clb" id="balLabel">收入餘額合計</div><div class="clv" id="s4">0.00</div></div>
</div>

<div class="fbar" id="fbar"></div>
<div class="shdr"><span>歷史資料</span><span id="cnt">0 筆</span></div>
<div class="rlist" id="rlist"></div>

<!-- 選類型 -->

<div class="ov" id="ovType">
  <div class="sheet">
    <div class="hdl"></div>
    <div class="stit full" style="padding-bottom:12px">選擇新增類型</div>
    <button class="xcl" id="btnTypeClose">✕</button>
    <div class="type-grid">
      <div class="type-btn t-ex" id="tEx"><div class="tbi">💸</div><div class="tbl">支出</div><div class="tbs">記錄花費</div></div>
      <div class="type-btn t-in" id="tIn"><div class="tbi">💰</div><div class="tbl">本期收入</div><div class="tbs">記錄收入</div></div>
      <div class="type-btn t-op" id="tOp"><div class="tbi">🏦</div><div class="tbl">結餘</div><div class="tbs">可輸入負數</div></div>
      <div class="type-btn t-full" id="tFull"><div class="tbi">📋</div><div class="tbl">完整紀錄</div><div class="tbs">同時填所有欄位</div></div>
    </div>
    <div style="height:8px"></div>
  </div>
</div>

<!-- 快速新增 -->

<div class="ov" id="ovQuick">
  <div class="sheet">
    <div class="hdl"></div>
    <div class="stit" id="quickTit">新增支出</div>
    <button class="xcl" id="btnQuickClose">✕</button>
    <div class="fbody">
      <div class="fg"><label>日期</label><input class="fi" type="date" id="qDate"></div>
      <div class="divr"></div>
      <div class="fg"><label id="qAmtLabel">金額</label><input class="fi" type="number" placeholder="0.00" id="qAmt"><span class="fe" id="eqAmt"></span></div>
      <div class="fg"><label>備註（選填）</label><textarea class="fi" placeholder="說明..." id="qNote" rows="3"></textarea></div>
      <button class="sbtn" id="btnQuickSave">💾 儲存</button>
    </div>
  </div>
</div>

<!-- 完整新增/修改 -->

<div class="ov" id="ovForm">
  <div class="sheet">
    <div class="hdl"></div>
    <div class="stit full" id="formTit">完整紀錄</div>
    <button class="xcl" id="btnFormClose">✕</button>
    <div class="fbody">
      <div class="fg"><label>日期</label><input class="fi" type="date" id="fDate"></div>
      <div class="divr"></div>
      <div class="fg"><label>結餘（可輸入負數）</label><input class="fi" type="number" placeholder="0.00" id="fOp"><span class="fe" id="eOp"></span></div>
      <div class="fg"><label>本期收入</label><input class="fi" type="number" inputmode="decimal" placeholder="0.00" id="fIn"><span class="fe" id="eIn"></span></div>
      <div class="fg"><label>支出</label><input class="fi" type="number" inputmode="decimal" placeholder="0.00" id="fEx"><span class="fe" id="eEx"></span></div>
      <div class="comp"><span class="compl">本期收入餘額（自動計算）</span><span class="compv" id="fBal">0.00</span></div>
      <div class="divr"></div>
      <div class="fg"><label>備註（選填）</label><textarea class="fi" placeholder="說明..." id="fNote" rows="3"></textarea></div>
      <button class="sbtn full" id="btnSave">💾 儲存</button>
    </div>
  </div>
</div>

<!-- 匯出 -->

<div class="ov" id="ovExp">
  <div class="sheet" style="padding-bottom:12px">
    <div class="hdl"></div>
    <div class="stit full">匯出資料</div>
    <button class="xcl" id="btnExpClose">✕</button>
    <div class="eopt" id="btnCsv"><div class="eico ecsv">📊</div><div><div class="et">匯出 CSV（Excel 格式）</div><div class="es">含所有欄位與備註</div></div></div>
    <div class="eopt" id="btnPdf"><div class="eico epdf">📄</div><div><div class="et">匯出 PDF 報表</div><div class="es">開啟列印視窗存成 PDF</div></div></div>
  </div>
</div>

<!-- 確認刪除 -->

<div class="cov" id="ovConf">
  <div class="cbox">
    <div class="chdr"><div class="ctit">刪除紀錄</div><div class="cmsg" id="confMsg"></div></div>
    <div class="cbtns">
      <button class="cbtn cno" id="btnConfNo">取消</button>
      <button class="cbtn cyes" id="btnConfYes">刪除</button>
    </div>
  </div>
</div>

<div class="tst" id="tst"></div>

<script>
var recs=[],editId=null,openRow=null,filt='all',delId=null,curType=null,KEY='ftv7';
function sv(){try{localStorage.setItem(KEY,JSON.stringify(recs));}catch(e){}}
function ld(){try{var d=localStorage.getItem(KEY);if(d)recs=JSON.parse(d);}catch(e){recs=[];}}
function fm(v){return Number(v).toLocaleString('zh-TW',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fr(v){return Number(v).toFixed(2);}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function td(){return new Date().toISOString().slice(0,10);}
function srt(){recs.sort(function(a,b){return b.date>a.date?1:-1;});}
function gf(){return filt==='all'?recs:recs.filter(function(r){return r.date.slice(0,7)===filt;});}
function gm(){var s={};recs.forEach(function(r){s[r.date.slice(0,7)]=1;});return['all'].concat(Object.keys(s).sort().reverse());}
var tt;
function toast(m){var e=document.getElementById('tst');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){e.classList.remove('show');},2200);}
function render(){srt();rCards();rFilters();rList();}

function calcTotals(){
  var r=gf(),op=0,inc=0,ex=0,bl=0;
  r.forEach(function(x){
    if(x.type==='full'){op+=x.op||0;inc+=x.inc||0;ex+=x.ex||0;bl+=((x.op||0)+(x.inc||0)-(x.ex||0));}
    else if(x.type==='ex'){ex+=x.amt||0;}
    else if(x.type==='in'){inc+=x.amt||0;}
    else if(x.type==='op'){op+=x.amt||0;}
  });
  return{op:op,inc:inc,ex:ex,bl:bl};
}

function rCards(){
  var t=calcTotals();
  document.getElementById('s1').textContent=fm(t.op);
  document.getElementById('s2').textContent=fm(t.inc);
  document.getElementById('s3').textContent=fm(t.ex);
  document.getElementById('s4').textContent=fm(t.bl);

  // Warning logic
  var card=document.getElementById('balCard');
  var banner=document.getElementById('warnBanner');
  var msg=document.getElementById('warnMsg');
  var lbl=document.getElementById('balLabel');

  if(t.bl<0){
    card.className='card cb danger';
    lbl.innerHTML='收入餘額合計 🚨';
    banner.classList.add('show');
    msg.textContent='收入餘額為負數（'+fm(t.bl)+'），請立即注意支出！';
  } else if(t.bl===0&&recs.length>0){
    card.className='card cb danger';
    lbl.innerHTML='收入餘額合計 ⚠️';
    banner.classList.add('show');
    msg.textContent='收入餘額為零，已無可用餘額！';
  } else if(t.bl>0&&t.inc>0&&t.bl<t.inc*0.2){
    card.className='card cb danger';
    lbl.innerHTML='收入餘額合計 ⚠️';
    banner.classList.add('show');
    msg.textContent='收入餘額僅剩 '+fm(t.bl)+'，不足收入的 20%，請注意！';
  } else {
    card.className='card cb';
    lbl.innerHTML='收入餘額合計';
    banner.classList.remove('show');
  }
}

function rFilters(){
  var bar=document.getElementById('fbar'),ms=gm();
  if(ms.length<=2){bar.innerHTML='';return;}
  var h='';
  for(var i=0;i<ms.length;i++){h+='<span class="chip'+(ms[i]===filt?' on':'')+'" data-m="'+ms[i]+'">'+(ms[i]==='all'?'全部':ms[i])+'</span>';}
  bar.innerHTML=h;
  var chips=bar.querySelectorAll('.chip');
  for(var j=0;j<chips.length;j++){chips[j].addEventListener('click',function(){filt=this.getAttribute('data-m');render();});}
}

function typeMeta(type){
  if(type==='ex')return{label:'支出',badge:'badge-ex',cls:'ex',icon:'💸'};
  if(type==='in')return{label:'本期收入',badge:'badge-in',cls:'in',icon:'💰'};
  if(type==='op')return{label:'結餘',badge:'badge-op',cls:'op',icon:'🏦'};
  return{label:'完整紀錄',badge:'badge-full',cls:'bl',icon:'📋'};
}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function rList(){
  var r=gf(),list=document.getElementById('rlist');
  document.getElementById('cnt').textContent=r.length+' 筆';
  if(!r.length){list.innerHTML='<div class="empty"><div class="ei">📋</div><div>目前沒有紀錄<br>點右上角「＋ 新增」開始記帳</div></div>';return;}
  var h='';
  for(var i=0;i<r.length;i++){
    var x=r[i],m=typeMeta(x.type);
    var body='';
    if(x.type==='full'){
      var b=(x.op||0)+(x.inc||0)-(x.ex||0);
      body='<div class="rtop"><span class="rdate">'+x.date+'</span><span class="rbadge '+m.badge+'">'+m.icon+' '+m.label+'</span></div>';
      body+='<div class="rgrid"><div><div class="rfl">結餘</div><div class="rfv">'+fm(x.op||0)+'</div></div><div><div class="rfl">本期收入</div><div class="rfv" style="color:#52c99a">'+fm(x.inc||0)+'</div></div><div><div class="rfl">支出</div><div class="rfv" style="color:#f06b7a">'+fm(x.ex||0)+'</div></div></div>';
      body+='<div style="margin-top:6px;font-size:.78rem">收入餘額：<span style="font-family:Menlo,monospace;font-weight:700;color:'+(b>=0?'#6aadff':'#f06b7a')+'">'+fm(b)+(b<0?' 🚨':b===0?' ⚠️':'')+'</span></div>';
    } else {
      var warn=x.type==='op'&&(x.amt||0)<0?' 🚨':'';
      body='<div class="rtop"><span class="rdate">'+x.date+'</span><span class="rbadge '+m.badge+'">'+m.icon+' '+m.label+'</span></div>';
      body+='<div class="ramt '+m.cls+((x.amt||0)<0?' neg':'')+'">'+fm(x.amt||0)+warn+'</div>';
    }
    if(x.note){body+='<div class="rnote">📝 '+esc(x.note)+'</div>';}
    h+='<div class="ritem"><div class="rmain" data-id="'+x.id+'">'+body+'</div><div class="racts" id="act-'+x.id+'"><button class="ract e" data-id="'+x.id+'">✏️ 修改</button><button class="ract d" data-id="'+x.id+'" data-date="'+x.date+'">🗑 刪除</button></div></div>';
  }
  list.innerHTML=h;
  var mains=list.querySelectorAll('.rmain');
  for(var a=0;a<mains.length;a++){mains[a].addEventListener('click',function(){tRow(this.getAttribute('data-id'));});}
  var edits=list.querySelectorAll('.ract.e');
  for(var b=0;b<edits.length;b++){edits[b].addEventListener('click',function(e){e.stopPropagation();oEdit(this.getAttribute('data-id'));});}
  var ds=list.querySelectorAll('.ract.d');
  for(var c=0;c<ds.length;c++){ds[c].addEventListener('click',function(e){e.stopPropagation();aDel(this.getAttribute('data-id'),this.getAttribute('data-date'));});}
}

function tRow(id){
  if(openRow&&openRow!==id){var p=document.getElementById('act-'+openRow);if(p)p.classList.remove('open');}
  var el=document.getElementById('act-'+id);if(!el)return;
  openRow=el.classList.toggle('open')?id:null;
}

function openTypeSheet(){document.getElementById('ovType').classList.add('open');}
function closeTypeSheet(){document.getElementById('ovType').classList.remove('open');}

function openQuick(type){
  closeTypeSheet();curType=type;editId=null;
  var m=typeMeta(type);
  document.getElementById('quickTit').textContent='新增'+m.label;
  document.getElementById('quickTit').className='stit '+m.cls;
  document.getElementById('qAmtLabel').textContent=m.label+'金額'+(type==='op'?'（可輸入負數）':'');
  document.getElementById('btnQuickSave').className='sbtn '+m.cls;
  document.getElementById('qDate').value=td();
  document.getElementById('qAmt').value='';
  document.getElementById('qNote').value='';
  document.getElementById('eqAmt').textContent='';
  document.getElementById('qAmt').classList.remove('err');
  document.getElementById('ovQuick').classList.add('open');
}
function closeQuick(){document.getElementById('ovQuick').classList.remove('open');curType=null;}

function saveQuick(){
  var date=document.getElementById('qDate').value;
  var amt=document.getElementById('qAmt').value;
  var note=document.getElementById('qNote').value.trim();
  if(amt===''||isNaN(parseFloat(amt))){document.getElementById('eqAmt').textContent='請輸入金額';document.getElementById('qAmt').classList.add('err');return;}
  var m=typeMeta(curType);
  var rec={id:editId||gid(),type:curType,date:date,amt:parseFloat(amt),note:note};
  if(editId){for(var i=0;i<recs.length;i++){if(recs[i].id===editId){recs[i]=rec;break;}}toast('✅ 已更新');}
  else{recs.push(rec);toast('✅ 新增'+m.label+'完成');}
  sv();closeQuick();render();
}

function calcBal(){
  var o=parseFloat(document.getElementById('fOp').value)||0;
  var i=parseFloat(document.getElementById('fIn').value)||0;
  var e=parseFloat(document.getElementById('fEx').value)||0;
  var b=o+i-e,el=document.getElementById('fBal');
  el.textContent=fm(b);el.className='compv'+(b<0?' neg':'');
}

function openFull(){
  closeTypeSheet();editId=null;
  document.getElementById('formTit').textContent='新增完整紀錄';
  document.getElementById('fDate').value=td();
  ['Op','In','Ex'].forEach(function(k){document.getElementById('f'+k).value='';document.getElementById('e'+k).textContent='';document.getElementById('f'+k).classList.remove('err');});
  document.getElementById('fNote').value='';calcBal();
  document.getElementById('ovForm').classList.add('open');
}
function closeForm(){document.getElementById('ovForm').classList.remove('open');editId=null;}

function oEdit(id){
  if(openRow){var el=document.getElementById('act-'+openRow);if(el)el.classList.remove('open');openRow=null;}
  var r=null;for(var i=0;i<recs.length;i++){if(recs[i].id===id){r=recs[i];break;}}
  if(!r)return;editId=id;
  if(r.type==='full'){
    document.getElementById('formTit').textContent='修改完整紀錄';
    document.getElementById('fDate').value=r.date;
    document.getElementById('fOp').value=fr(r.op||0);
    document.getElementById('fIn').value=fr(r.inc||0);
    document.getElementById('fEx').value=fr(r.ex||0);
    document.getElementById('fNote').value=r.note||'';
    ['Op','In','Ex'].forEach(function(k){document.getElementById('e'+k).textContent='';document.getElementById('f'+k).classList.remove('err');});
    calcBal();document.getElementById('ovForm').classList.add('open');
  } else {
    curType=r.type;var m=typeMeta(r.type);
    document.getElementById('quickTit').textContent='修改'+m.label;
    document.getElementById('quickTit').className='stit '+m.cls;
    document.getElementById('qAmtLabel').textContent=m.label+'金額'+(r.type==='op'?'（可輸入負數）':'');
    document.getElementById('btnQuickSave').className='sbtn '+m.cls;
    document.getElementById('qDate').value=r.date;
    document.getElementById('qAmt').value=fr(r.amt||0);
    document.getElementById('qNote').value=r.note||'';
    document.getElementById('eqAmt').textContent='';
    document.getElementById('qAmt').classList.remove('err');
    document.getElementById('ovQuick').classList.add('open');
  }
}

function saveFull(){
  var date=document.getElementById('fDate').value,op=document.getElementById('fOp').value,inc=document.getElementById('fIn').value,ex=document.getElementById('fEx').value,note=document.getElementById('fNote').value.trim(),ok=true;
  function chk(f,v,l){if(v===''||isNaN(parseFloat(v))){document.getElementById('e'+f).textContent='請輸入'+l;document.getElementById('f'+f).classList.add('err');ok=false;}}
  chk('Op',op,'結餘');chk('In',inc,'收入');chk('Ex',ex,'支出');
  if(!ok)return;
  var rec={id:editId||gid(),type:'full',date:date,op:parseFloat(op),inc:parseFloat(inc),ex:parseFloat(ex),note:note};
  if(editId){for(var i=0;i<recs.length;i++){if(recs[i].id===editId){recs[i]=rec;break;}}toast('✅ 已更新');}
  else{recs.push(rec);toast('✅ 已新增');}
  sv();closeForm();render();
}

function aDel(id,date){delId=id;document.getElementById('confMsg').textContent='確定要刪除 '+date+' 的紀錄嗎？';document.getElementById('ovConf').classList.add('open');}

function doCSV(){
  var r=gf(),rows=['日期,類型,金額/結餘,本期收入,支出,本期收入餘額,備註'];
  for(var i=0;i<r.length;i++){
    var x=r[i],m=typeMeta(x.type);
    if(x.type==='full'){rows.push(x.date+',完整紀錄,'+fr(x.op||0)+','+fr(x.inc||0)+','+fr(x.ex||0)+','+fr((x.op||0)+(x.inc||0)-(x.ex||0))+','+(x.note?'"'+x.note.replace(/"/g,'""')+'"':''));}
    else{rows.push(x.date+','+m.label+','+fr(x.amt||0)+',,,,'+(x.note?'"'+x.note.replace(/"/g,'""')+'"':''));}
  }
  var blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='收支記錄.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('📊 CSV 匯出完成');
}

function doPDF(){
  var r=gf(),rows='';
  for(var j=0;j<r.length;j++){
    var x=r[j],m=typeMeta(x.type),bg=j%2===0?'#f5f7fa':'#fff';
    var colors={ex:'#f06b7a',in:'#52c99a',op:'#e8c87a',full:'#6aadff'};
    if(x.type==='full'){
      var b=(x.op||0)+(x.inc||0)-(x.ex||0);
      rows+='<tr style="background:'+bg+'"><td>'+x.date+'</td><td style="color:'+colors[x.type]+'">'+m.icon+' '+m.label+'</td><td>'+fr(x.op||0)+'</td><td>'+fr(x.inc||0)+'</td><td>'+fr(x.ex||0)+'</td><td style="color:'+(b>=0?'#1a5fd4':'#c0392b')+'">'+fr(b)+(b<0?' ⚠️':'')+'</td><td style="font-size:11px;color:#666">'+(x.note||'')+'</td></tr>';
    } else {
      rows+='<tr style="background:'+bg+'"><td>'+x.date+'</td><td style="color:'+colors[x.type]+'">'+m.icon+' '+m.label+'</td><td colspan="4" style="color:'+colors[x.type]+'">'+fr(x.amt||0)+((x.type==='op'&&(x.amt||0)<0)?' ⚠️':'')+'</td><td style="font-size:11px;color:#666">'+(x.note||'')+'</td></tr>';
    }
  }
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>收支記錄</title><style>body{font-family:-apple-system,sans-serif;padding:32px}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#1a1a2e;color:#fff;padding:9px 10px;text-align:right}th:first-child,th:nth-child(2),th:last-child{text-align:left}td{padding:8px 10px;text-align:right;font-family:monospace}td:first-child,td:nth-child(2),td:last-child{text-align:left;font-family:sans-serif}@media print{body{margin:0}}</style></head><body><h2>收支記錄報表</h2><p style="font-size:12px;color:#666;margin-bottom:16px">'+new Date().toLocaleDateString('zh-TW')+' | '+r.length+' 筆</p><table><thead><tr><th>日期</th><th>類型</th><th>結餘</th><th>本期收入</th><th>支出</th><th>收入餘額</th><th>備註</th></tr></thead><tbody>'+rows+'</tbody></table><script>window.onload=function(){window.print();}<\/script></body></html>';

var w=window.open(’’,’_blank’);if(w){w.document.write(html);w.document.close();}
toast(‘📄 PDF 視窗已開啟’);
}

window.onload=function(){
ld();render();
document.getElementById(‘btnAdd’).addEventListener(‘click’,openTypeSheet);
document.getElementById(‘btnTypeClose’).addEventListener(‘click’,closeTypeSheet);
document.getElementById(‘tEx’).addEventListener(‘click’,function(){openQuick(‘ex’);});
document.getElementById(‘tIn’).addEventListener(‘click’,function(){openQuick(‘in’);});
document.getElementById(‘tOp’).addEventListener(‘click’,function(){openQuick(‘op’);});
document.getElementById(‘tFull’).addEventListener(‘click’,openFull);
document.getElementById(‘btnQuickClose’).addEventListener(‘click’,closeQuick);
document.getElementById(‘btnQuickSave’).addEventListener(‘click’,saveQuick);
document.getElementById(‘btnFormClose’).addEventListener(‘click’,closeForm);
document.getElementById(‘btnSave’).addEventListener(‘click’,saveFull);
document.getElementById(‘fOp’).addEventListener(‘input’,calcBal);
document.getElementById(‘fIn’).addEventListener(‘input’,calcBal);
document.getElementById(‘fEx’).addEventListener(‘input’,calcBal);
document.getElementById(‘btnExp’).addEventListener(‘click’,function(){document.getElementById(‘ovExp’).classList.add(‘open’);});
document.getElementById(‘btnExpClose’).addEventListener(‘click’,function(){document.getElementById(‘ovExp’).classList.remove(‘open’);});
document.getElementById(‘btnCsv’).addEventListener(‘click’,function(){document.getElementById(‘ovExp’).classList.remove(‘open’);doCSV();});
document.getElementById(‘btnPdf’).addEventListener(‘click’,function(){document.getElementById(‘ovExp’).classList.remove(‘open’);doPDF();});
document.getElementById(‘btnConfNo’).addEventListener(‘click’,function(){document.getElementById(‘ovConf’).classList.remove(‘open’);delId=null;});
document.getElementById(‘btnConfYes’).addEventListener(‘click’,function(){
var tmp=[];for(var i=0;i<recs.length;i++){if(recs[i].id!==delId)tmp.push(recs[i]);}
recs=tmp;sv();render();toast(‘🗑 已刪除’);
document.getElementById(‘ovConf’).classList.remove(‘open’);delId=null;
});
document.getElementById(‘ovType’).addEventListener(‘click’,function(e){if(e.target===this)closeTypeSheet();});
document.getElementById(‘ovQuick’).addEventListener(‘click’,function(e){if(e.target===this)closeQuick();});
document.getElementById(‘ovForm’).addEventListener(‘click’,function(e){if(e.target===this)closeForm();});
document.getElementById(‘ovExp’).addEventListener(‘click’,function(e){if(e.target===this)document.getElementById(‘ovExp’).classList.remove(‘open’);});
};
</script>

</body>
